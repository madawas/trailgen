name: CI

on:
  push:
    branches:
      - main
      - "release/*"
  pull_request:

jobs:
  smoke-render:
    if: ${{ secrets.MAPTILER_KEY != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium

      - name: Smoke render
        env:
          MAPTILER_KEY: ${{ secrets.MAPTILER_KEY }}
          TRAILGEN_CACHE_DIR: /tmp/trailgen-cache
        run: |
          python -m trailgen.cli.main render \
            --gpx export.gpx \
            --out /tmp/trailgen-smoke.mp4 \
            --fps 5 \
            --duration 3 \
            --quality preview \
            --resolution 720p \
            --orientation landscape
